# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Windows, CPU only"                    # Or: "AWS EC2 c5.4xlarge", "Local Linux box", etc.
  cpu_cores: 8                                  # Number of CPU cores used
  ram_gb: 8                                    # Available RAM in GB
  python_version: "3.10+"                      # python --version
  os: "Windows"                              # Or "Ubuntu 22.04 LTS", etc.
  uses_gpu_for_inference: false                 # Must be false — see compute constraints
  has_network_during_ranking: false             # Must be false — no API calls during ranking
  pre_computation_required: false               # true if you pre-compute embeddings or train models offline
  pre_computation_time_minutes: 0               # Approximate, if applicable

# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Be honest. Stage 5 interview
# may verify these declarations against your code; declarations that contradict
# your code or your interview are flagged.
ai_tools_used:
  - "Claude"    

ai_usage_summary: |
  Used Claude for code review, and debugging during
  development. No candidate data was fed to any LLM. The ranking step itself
  contains zero LLM calls. Claude was used purely as a development assistant, not as part of the
  ranking pipeline.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Two-pass streaming ranker over 100K candidates, O(heap) memory.
  Pass 1 builds a shared IDF table (BM25 + TF-IDF calibrated on the full
  corpus). Pass 2 gates ~80 honeypots via 7 hard checks (impossible tenure,
  expert skills with zero usage months, fabricated duration) then scores
  clean candidates across 9 components: career evidence depth, tiered skill
  trust (endorsements × duration × proficiency × assessment bonus), BM25,
  TF-IDF cosine, NLP/IR domain signal, experience band fit, product-vs-services
  background, external validation, and location. Skills are normalized to
  canonical groups (Tier A: retrieval/ranking/embeddings; Tier B: ML/DL/LLMs)
  to prevent synonym inflation. A plain-language boost rewards candidates who
  describe retrieval concepts in their own words. Reasoning is generated
  post-sort so tone is calibrated to rank position. Runtime: ~42s on a
  standard CPU laptop, ~350 MB peak memory, no GPU, no API calls.

